name: Build and publish release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version component to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Require the main branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Releases must be run from the main branch (selected: $GITHUB_REF)." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: true

      - name: Install web dependencies
        run: npm ci

      - name: Bump version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          npm version "$BUMP" --no-git-tag-version
          release_version="$(node -p "require('./package.json').version")"
          release_tag="v${release_version}"

          if git rev-parse --quiet --verify "refs/tags/$release_tag" >/dev/null; then
            echo "Tag $release_tag already exists." >&2
            exit 1
          fi

          echo "version=$release_version" >> "$GITHUB_OUTPUT"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Build embedded web application
        run: npm run build:web:embedded

      - name: Test Go server
        run: go test ./...

      - name: Build release executables
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release .release-work

          while read -r target_os target_arch; do
            archive_name="schematic_${VERSION}_${target_os}_${target_arch}"
            work_dir=".release-work/${archive_name}"
            mkdir -p "$work_dir"

            executable="schematic"
            if [ "$target_os" = "windows" ]; then
              executable="schematic.exe"
            fi

            CGO_ENABLED=0 GOOS="$target_os" GOARCH="$target_arch" \
              go build -trimpath -ldflags="-s -w" -o "$work_dir/$executable" .

            if [ "$target_os" = "windows" ]; then
              (cd "$work_dir" && zip -q "../../release/${archive_name}.zip" "$executable")
            else
              tar -C "$work_dir" -czf "release/${archive_name}.tar.gz" "$executable"
            fi
          done <<'TARGETS'
          linux amd64
          linux arm64
          darwin amd64
          darwin arm64
          windows amd64
          TARGETS

          (cd release && sha256sum ./*.tar.gz ./*.zip > checksums.txt)

      - name: Commit and tag version
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${RELEASE_TAG}"
          git tag -a "$RELEASE_TAG" -m "Release ${RELEASE_TAG}"
          git push --atomic origin HEAD:main "$RELEASE_TAG"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" release/* \
            --verify-tag \
            --title "Schematic ${RELEASE_TAG}" \
            --generate-notes
